<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/685/685655.png">
    <title>My Silent Cam</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #shutter {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 80px; height: 80px; background: rgba(255,255,255,0.8);
            border: 5px solid #fff; border-radius: 50%; z-index: 100;
        }
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <video id="v" autoplay playsinline muted></video>
    <div id="flash"></div>
    <div id="shutter"></div>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const v = document.getElementById('v'), 
              s = document.getElementById('shutter'), 
              f = document.getElementById('flash'), 
              c = document.getElementById('c');

        // ★ ここが画質を限界まで上げる設定 ★
        const constraints = {
            video: {
                facingMode: "environment",
                width: { ideal: 4096 }, // iPhoneの最大解像度を狙う
                height: { ideal: 2160 }
            },
            audio: false
        };

        navigator.mediaDevices.getUserMedia(constraints).then(stream => {
            v.srcObject = stream;
            v.play();
        });

        s.onclick = () => {
            f.style.opacity = 1; 
            setTimeout(() => f.style.opacity = 0, 100);
            
            c.width = v.videoWidth; 
            c.height = v.videoHeight;
            
            const ctx = c.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(v, 0, 0, c.width, c.height);
            
            // ★ 画質100%(1.0)のJPEGで保存 ★
            c.toBlob(blob => {
                const file = new File([blob], `photo_${Date.now()}.jpg`, { type: "image/jpeg" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ files: [file] }).catch(() => {});
                }
            }, 'image/jpeg', 1.0); 
        };
    </script>
</body>
</html>
