 <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/685/685655.png">
    <title>Native Cam</title>
    <style>
        /* 純正ルックのためのUI設計と誤操作防止 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; position: fixed; user-select: none; -webkit-user-select: none; }
        
        /* カメラの表示エリア（下部の黒帯を避ける） */
        #camera-container { position: relative; width: 100%; height: calc(100% - 130px); background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* コントロールバーとシャッターボタン */
        #bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 130px; background: #000; display: flex; justify-content: center; align-items: center; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
        #shutter { width: 66px; height: 66px; background: #fff; border-radius: 50%; border: 3px solid #000; box-shadow: 0 0 0 4px #fff; transition: transform 0.1s; }
        #shutter:active { transform: scale(0.9); }
        
        /* シャッターフラッシュ */
        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; opacity: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>
    <div id="camera-container">
        <video id="v" autoplay playsinline muted></video>
        <div id="flash"></div>
    </div>
    <div id="bottom-bar">
        <div id="shutter"></div>
    </div>
    <canvas id="c" style="display:none"></canvas>

    <script>
        const v = document.getElementById('v'), s = document.getElementById('shutter'), f = document.getElementById('flash'), c = document.getElementById('c');
        let track = null;
        let currentZoom = 1, minZoom = 1, maxZoom = 3, initialPinchDist = null, initialZoom = 1;

        // 画質を最大化する制約
        const constraints = {
            video: { facingMode: "environment", width: { ideal: 4096 }, height: { ideal: 2160 } },
            audio: false
        };

        // カメラ起動とズーム機能の初期化
        navigator.mediaDevices.getUserMedia(constraints).then(stream => {
            v.srcObject = stream;
            v.play();
            track = stream.getVideoTracks()[0];
            
            setTimeout(() => {
                const capabilities = track.getCapabilities();
                if (capabilities.zoom) {
                    minZoom = capabilities.zoom.min || 1;
                    maxZoom = capabilities.zoom.max || 3;
                    currentZoom = track.getSettings().zoom || minZoom;
                }
            }, 500);
        }).catch(e => alert("カメラの起動に失敗しました"));

        // 指2本でのピンチ操作（距離の計算）
        v.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialPinchDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                initialZoom = currentZoom;
            }
        }, { passive: false });

        // ピンチ中のズーム倍率適用
        v.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist && track) {
                e.preventDefault(); // 画面全体のスクロールを防止
                const currentDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                const scale = currentDist / initialPinchDist;
                let newZoom = initialZoom * scale;
                newZoom = Math.max(minZoom, Math.min(newZoom, maxZoom)); // 最小〜最大の範囲に収める
                
                if (newZoom !== currentZoom) {
                    currentZoom = newZoom;
                    track.applyConstraints({ advanced: [{ zoom: currentZoom }] }).catch(err => console.log(err));
                }
            }
        }, { passive: false });

        // シャッター保存処理
        s.onclick = () => {
            f.style.opacity = 1; 
            setTimeout(() => f.style.opacity = 0, 150);
            
            c.width = v.videoWidth; 
            c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(v, 0, 0, c.width, c.height);
            
            c.toBlob(blob => {
                const file = new File([blob], `photo_${Date.now()}.jpg`, { type: "image/jpeg" });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    navigator.share({ files: [file] }).catch(() => {});
                }
            }, 'image/jpeg', 1.0); 
        };
    </script>
</body>
</html>
